name: nova_ai
description: "An AI-powered productivity assistant built with Flutter."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  dio: ^5.10.0
  flutter_secure_storage: ^10.3.1
  google_fonts: ^8.1.0
  flutter_animate: ^4.5.2
  lottie: ^3.4.0
  shared_preferences: ^2.5.5
  flutter_markdown: ^0.7.7+1
  markdown: ^7.3.0
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/lottie/